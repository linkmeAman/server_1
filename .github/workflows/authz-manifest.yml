name: Authz Manifest Validation

on:
  pull_request:
    paths:
      - "authz/resources_manifest.yaml"
      - "scripts/auth/validate_authz_manifest.py"
      - ".github/workflows/authz-manifest.yml"
  push:
    branches: ["**"]
    paths:
      - "authz/resources_manifest.yaml"
      - "scripts/auth/validate_authz_manifest.py"

jobs:
  validate-authz-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate manifest
        run: python scripts/auth/validate_authz_manifest.py --manifest authz/resources_manifest.yaml
