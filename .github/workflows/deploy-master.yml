name: Deploy to Production

on:
  push:
    branches:
      - master  # Change to 'main' if your default branch is called main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Execute deployment commands via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        # Modify the cd path and port below to match your main production server folder
        script: |
          # 1. Navigate to the main application directory
          cd /var/www/py-workspace/server_1/
          
          # 2. Pull latest code
          git pull --no-rebase
          
          # 3. Clean up Python caches
          find . -type d -name "__pycache__" -exec rm -rf {} + 
          find . -type f -name "*.pyc" -delete
          
          # 4. Restart the systemd service
          sudo systemctl restart py-server-1
